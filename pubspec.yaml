name: meow_agent
description: "Meow Agent - Android-native agentic AI app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  sqflite: ^2.4.1

  # Utilities
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  file_picker: ^8.1.6
  flutter_markdown: ^0.7.6
  syncfusion_flutter_calendar: ^28.1.33

  # Workflow scheduling & notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  workmanager: ^0.9.0+3
  android_alarm_manager_plus: ^5.0.0

  # Workflow event listeners
  battery_plus: ^6.2.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

name: meow_agent
description: "Meow Agent - Android-native agentic AI app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  sqflite: ^2.4.1

  # Utilities
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  file_picker: ^8.1.6
  gpt_markdown: ^1.1.7
  syncfusion_flutter_calendar: ^28.1.33

  # WebView for sandbox apps
  webview_flutter: ^4.10.0

  # Workflow scheduling & notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  workmanager: ^0.9.0+3
  android_alarm_manager_plus: ^5.0.0

  # Workflow event listeners
  battery_plus: ^6.2.0
  connectivity_plus: ^6.1.0

  # Permissions
  permission_handler: ^11.3.1

  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/launcher.png
  android_12:
    image: assets/icon/launcher.png
    color: "#FFFFFF"
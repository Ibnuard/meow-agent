name: Deployment APK Release

on:
  pull_request:
    branches:
      - deployment
    types:
      - closed

permissions:
  contents: write

# Build numbers and tags must be created one at a time.
concurrency:
  group: deployment-apk-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release APK
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out deployment
        uses: actions/checkout@v4
        with:
          ref: deployment
          fetch-depth: 0
          token: ${{ secrets.DEPLOYMENT_RELEASE_TOKEN || github.token }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_ALIAS" || -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "One or more Android release-signing secrets are missing." >&2
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/meow-release.jks"
          keytool -list \
            -keystore "$RUNNER_TEMP/meow-release.jks" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" > /dev/null

      - name: Increment build number
        id: version
        shell: bash
        run: |
          version_line="$(grep -E '^version:[[:space:]]*[^+[:space:]]+\+[0-9]+[[:space:]]*$' pubspec.yaml || true)"

          if [[ -z "$version_line" ]]; then
            echo "pubspec.yaml must contain a version in the form <app-version>+<build-number>." >&2
            exit 1
          fi

          current_version="$(sed -E 's/^version:[[:space:]]*([^+[:space:]]+)\+([0-9]+)[[:space:]]*$/\1/' <<< "$version_line")"
          current_build="$(sed -E 's/^version:[[:space:]]*([^+[:space:]]+)\+([0-9]+)[[:space:]]*$/\2/' <<< "$version_line")"
          next_build="$((current_build + 1))"
          release_version="${current_version}+${next_build}"
          release_tag="v${release_version}"

          sed -i -E "s/^version:[[:space:]]*[^+[:space:]]+\+[0-9]+[[:space:]]*$/version: ${release_version}/" pubspec.yaml

          echo "app_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "build_number=$next_build" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Commit incremented build number
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): bump build to ${{ steps.version.outputs.release_version }} [skip ci]"
          git push origin HEAD:deployment

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/meow-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK
        id: apk
        shell: bash
        run: |
          apk_name="meow-agent-${{ steps.version.outputs.release_version }}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/$apk_name"
          echo "path=build/app/outputs/flutter-apk/$apk_name" >> "$GITHUB_OUTPUT"
          echo "name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        shell: bash
        run: |
          build_tools_dir="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools_dir/apksigner" verify \
            --verbose \
            --print-certs \
            "${{ steps.apk.outputs.path }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: meow-agent-${{ steps.version.outputs.release_version }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Create and push release tag
        shell: bash
        run: |
          git tag -a "${{ steps.version.outputs.release_tag }}" -m "Meow Agent ${{ steps.version.outputs.release_version }}"
          git push origin "${{ steps.version.outputs.release_tag }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.DEPLOYMENT_RELEASE_TOKEN || github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.release_tag }}" \
            "${{ steps.apk.outputs.path }}#${{ steps.apk.outputs.name }}" \
            --title "Meow Agent ${{ steps.version.outputs.release_version }}" \
            --generate-notes \
            --verify-tag
